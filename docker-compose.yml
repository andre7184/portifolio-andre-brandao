services:
  portfolio-andre:
    build: .
    container_name: portfolio_andre
    restart: always
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      
      # --- Roteador Principal ---
      - "traefik.http.routers.portfolio.rule=Host(`portfolio.promptweb.com.br`)"
      - "traefik.http.routers.portfolio.entrypoints=websecure"
      - "traefik.http.routers.portfolio.tls=true"
      - "traefik.http.routers.portfolio.tls.certresolver=letsencrypt"
      - "traefik.http.services.portfolio.loadbalancer.server.port=80"


networks:
  traefik:
    external: true